<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mailyard</title>
    <script>
      // Match the app's theme before first paint. Same-origin, so the app's
      // "theme" localStorage key is readable here.
      const stored = localStorage.getItem("theme")
      const dark =
        stored === "dark" ||
        (stored !== "light" &&
          matchMedia("(prefers-color-scheme: dark)").matches)
      document.documentElement.classList.toggle("dark", dark)
    </script>
    <style>
      /* Deliberately static & framework-free: this window paints instantly
			   while the main webview boots. The window itself is transparent —
			   the rounded card below is the visible splash. Color values mirror
			   --background / --border from src/index.css. */
      :root {
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0.008 326);
        --border: oklch(0.922 0.005 325.62);
        --dot: oklch(0.542 0.034 322.5);
      }
      .dark {
        --background: oklch(0.145 0.008 326);
        --foreground: oklch(0.985 0 0);
        --border: oklch(1 0 0 / 10%);
        --dot: oklch(0.985 0 0);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        --wails-draggable: drag;
      }
      body {
        display: flex;
        padding: 16px;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
      }
      .card {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        border-radius: 22px;
        background: var(--background);
        border: 1px solid var(--border);
      }
      .logo {
        width: 72px;
        height: 72px;
        opacity: 0;
        animation: logo-in 420ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .dark .logo {
        opacity: 0;
        animation-name: logo-in-dark;
      }
      .dots {
        display: flex;
        gap: 8px;
      }
      .dots span {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--dot);
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes logo-in {
        from {
          opacity: 0;
          transform: scale(0.8) translateY(8px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      /* Same intro, but settles at the app's dark-mode logo opacity. */
      @keyframes logo-in-dark {
        from {
          opacity: 0;
          transform: scale(0.8) translateY(8px);
        }
        to {
          opacity: 0.8;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.25);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/logo.svg" alt="Mailyard" />
      <div class="dots" role="status" aria-label="Loading Mailyard">
        <span></span><span></span><span></span>
      </div>
    </div>
  </body>
</html>
