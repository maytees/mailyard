<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Mailyard</title>
		<style>
			/* Deliberately static & framework-free: this window exists to paint
			   instantly while the main webview boots. Colors match the app's
			   dark background (application.NewRGB(6, 7, 15)). */
			html,
			body {
				margin: 0;
				height: 100%;
				background: rgb(6, 7, 15);
				--wails-draggable: drag;
			}
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 28px;
				user-select: none;
				-webkit-user-select: none;
			}
			.logo {
				width: 72px;
				height: 72px;
				opacity: 0;
				animation: logo-in 420ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
			}
			.dots {
				display: flex;
				gap: 8px;
			}
			.dots span {
				width: 6px;
				height: 6px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.55);
				animation: pulse 1.2s ease-in-out infinite;
			}
			.dots span:nth-child(2) {
				animation-delay: 0.15s;
			}
			.dots span:nth-child(3) {
				animation-delay: 0.3s;
			}
			@keyframes logo-in {
				from {
					opacity: 0;
					transform: scale(0.8) translateY(8px);
				}
				to {
					opacity: 0.9;
					transform: scale(1) translateY(0);
				}
			}
			@keyframes pulse {
				0%,
				100% {
					opacity: 0.25;
					transform: scale(1);
				}
				50% {
					opacity: 1;
					transform: scale(1.25);
				}
			}
		</style>
	</head>
	<body>
		<img class="logo" src="/logo.svg" alt="Mailyard" />
		<div class="dots" role="status" aria-label="Loading Mailyard">
			<span></span><span></span><span></span>
		</div>
	</body>
</html>
